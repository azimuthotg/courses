<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — NPU Library LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-teal-900 to-teal-800 flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-teal-100 rounded-full mb-4">
        <svg class="w-8 h-8 text-teal-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">สำนักวิทยบริการ มนพ.</h1>
      <p class="text-gray-500 text-sm mt-1">ระบบเรียนรู้ออนไลน์</p>
    </div>

    <!-- Error -->
    {% if form.errors %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-6">
      ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง
    </div>
    {% endif %}

    <!-- Form -->
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้งาน (NPU Account)</label>
        <input type="text" name="username" autofocus required
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-600 focus:border-transparent"
          placeholder="username">
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-600 focus:border-transparent"
          placeholder="••••••••">
      </div>

      <button type="submit"
        class="w-full bg-teal-800 hover:bg-teal-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
        เข้าสู่ระบบ
      </button>
    </form>

  </div>
</body>
</html>
